<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다인 컷인 에디터 헬퍼 v2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; /* 기본 테마색 (파랑) */
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 20px; background-color: #f0f2f5; color: #333;
        }
        .container {
            max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px;
            border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }
        h2 { text-align: center; margin-top: 0; color: #1e293b; }
        
        /* 탭 스타일 */
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
        .tab-btn {
            padding: 12px 30px; cursor: pointer; border: none; background: none;
            font-size: 16px; font-weight: 600; color: #94a3b8;
            border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 공통 컨트롤 스타일 */
        .controls {
            margin-bottom: 20px; padding: 18px; background: var(--bg);
            border-radius: 10px; border: 1px solid #e2e8f0;
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center;
        }
        .input-group { display: flex; align-items: center; gap: 8px; }
        input[type="number"], input[type="text"] {
            width: 70px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px;
        }
        input[type="text"].full-width { width: 100%; }
        input[type="color"] {
            width: 40px; height: 38px; padding: 2px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer;
        }
        input[type="file"] { border: 1px dashed #cbd5e1; padding: 5px; border-radius: 4px; background: #fff; }
        .help-text { width: 100%; font-size: 13px; color: #64748b; margin: 0; }
        
        /* 이미지 영역 */
        .img-container {
            width: 100%; height: 500px; background-color: #f1f5f9;
            border-radius: 10px; overflow: hidden; border: 2px dashed #cbd5e1;
            position: relative; /* 가이드라인 오버레이를 위해 필요 */
        }
        img { max-width: 100%; display: block; }
        
        /* 버튼 */
        .action-btn {
            display: block; width: 100%; max-width: 300px; margin: 20px auto 0;
            background-color: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .action-btn:hover { background-color: var(--primary-hover); }
        .action-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* 가이드라인 SVG 스타일 */
        #silhouette-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; opacity: 0.6; display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎨 다인 컷인 에디터 헬퍼 v2</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-headshot')">1. 두상 크롭 (Headshot)</button>
        <button class="tab-btn" onclick="switchTab('tab-portrait')">2. 포트레이트 크롭 (Portrait)</button>
        <button class="tab-btn" onclick="switchTab('tab-cutin')">3. 컷인 크롭 (Cut-in)</button>
    </div>

    <div id="tab-headshot" class="tab-content active">
        <div class="controls">
            <input type="file" id="fileHeadshot" accept="image/*">
            <p class="help-text">1:1 정사각형 비율로 두상을 자릅니다. (단일 이미지)</p>
        </div>
        <div class="img-container">
            <img id="imgHeadshot">
        </div>
        <button id="btnCropHeadshot" class="action-btn" style="display:none;">이미지 다운로드</button>
    </div>

    <div id="tab-portrait" class="tab-content">
        <div class="controls">
            <input type="file" id="filePortrait" accept="image/*" multiple>
            <div class="input-group">
                <label>가로(px):</label>
                <input type="number" id="fixedWidth" value="460">
            </div>
            <div class="input-group">
                <label>글자색:</label>
                <input type="color" id="textColor" value="#6b21a8">
            </div>
            <div class="input-group" style="margin-left: 10px;">
                <input type="checkbox" id="toggleGuide" checked>
                <label for="toggleGuide">가이드라인</label>
            </div>
            <p class="help-text">여러 파일을 동일한 좌표로 자릅니다. 가로폭 고정, 세로 자유. (압축 파일 다운로드)</p>
            <p class="help-text">※ 첫 번째 이미지에서 영역을 지정하면 전체 적용되며, 각 파일 이름이 텍스트로 합성됩니다.</p>
        </div>
        <div class="img-container">
            <img id="imgPortrait">
        </div>
        <button id="btnCropPortrait" class="action-btn" style="display:none;">전체 자르기 (ZIP)</button>
    </div>

    <div id="tab-cutin" class="tab-content">
        <div class="controls">
            <input type="file" id="fileCutin" accept="image/*">
            <div class="input-group">
                <label>캔버스 가로:</label>
                <input type="number" id="canvasW" value="1200">
            </div>
            <div class="input-group">
                <label>캔버스 세로:</label>
                <input type="number" id="canvasH" value="400">
            </div>
            <div class="input-group">
                <label>배경색:</label>
                <input type="color" id="bgColor" value="#ffffff">
            </div>
            <p class="help-text">캔버스 크기를 직접 설정하고 자유롭게 배치하여 긴 컷인 이미지를 만듭니다.</p>
        </div>
        <div class="img-container">
            <img id="imgCutin">
        </div>
        <button id="btnCropCutin" class="action-btn" style="display:none;">컷인 생성 및 다운로드</button>
    </div>
</div>

<template id="silhouette-tpl">
    <svg id="silhouette-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <line x1="50" y1="0" x2="50" y2="100" stroke="#ff0044" stroke-width="0.5" stroke-dasharray="2" opacity="0.8"/>
        <line x1="0" y1="35" x2="100" y2="35" stroke="#ff0044" stroke-width="0.5" stroke-dasharray="2" opacity="0.8"/>
        <ellipse cx="50" cy="35" rx="22" ry="25" fill="none" stroke="#ff0044" stroke-width="1.5" stroke-dasharray="4"/>
        <path d="M 22 100 Q 22 75 50 75 Q 78 75 78 100" fill="none" stroke="#ff0044" stroke-width="1.5" stroke-dasharray="4"/>
    </svg>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    let cropperHeadshot, cropperPortrait, cropperCutin;
    let batchFiles = [];

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const tabBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabId));
        if(tabBtn) tabBtn.classList.add('active');
    }

    // ==========================================
    // 1. 두상 크롭 로직
    // ==========================================
    const imgHeadshot = document.getElementById('imgHeadshot');
    const btnCropHeadshot = document.getElementById('btnCropHeadshot');

    document.getElementById('fileHeadshot').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            imgHeadshot.src = ev.target.result;
            btnCropHeadshot.style.display = 'block';
            if (cropperHeadshot) cropperHeadshot.destroy();
            cropperHeadshot = new Cropper(imgHeadshot, { aspectRatio: 1, viewMode: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    btnCropHeadshot.addEventListener('click', () => {
        if (!cropperHeadshot) return;
        cropperHeadshot.getCroppedCanvas().toBlob(blob => downloadBlob(blob, 'headshot.png'));
    });

    // ==========================================
    // 2. 포트레이트 크롭 로직 (일괄 처리, 가이드라인, 텍스트 합성)
    // ==========================================
    const imgPortrait = document.getElementById('imgPortrait');
    const fixedWidthInput = document.getElementById('fixedWidth');
    const textColorInput = document.getElementById('textColor');
    const toggleGuideInput = document.getElementById('toggleGuide');
    const btnCropPortrait = document.getElementById('btnCropPortrait');

    document.getElementById('filePortrait').addEventListener('change', function(e) {
        batchFiles = Array.from(e.target.files);
        if (batchFiles.length === 0) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            imgPortrait.src = ev.target.result;
            btnCropPortrait.style.display = 'block';
            if (cropperPortrait) cropperPortrait.destroy();
            const fw = parseInt(fixedWidthInput.value, 10);
            cropperPortrait = new Cropper(imgPortrait, {
                viewMode: 1,
                ready() { 
                    cropperPortrait.setData({ width: fw });
                    // 가이드라인 주입
                    const viewBox = document.querySelector('#tab-portrait .cropper-view-box');
                    if (viewBox) {
                        const tpl = document.getElementById('silhouette-tpl').content.cloneNode(true);
                        viewBox.appendChild(tpl);
                        updateGuideVisibility();
                    }
                },
                cropmove(ev) {
                    const data = cropperPortrait.getData();
                    if (Math.round(data.width) !== fw) {
                        ev.preventDefault();
                        cropperPortrait.setData({ width: fw });
                    }
                }
            });
        };
        reader.readAsDataURL(batchFiles[0]);
    });

    // 가이드라인 끄기/켜기
    toggleGuideInput.addEventListener('change', updateGuideVisibility);
    function updateGuideVisibility() {
        const svg = document.getElementById('silhouette-svg');
        if (svg) svg.style.display = toggleGuideInput.checked ? 'block' : 'none';
    }

    btnCropPortrait.addEventListener('click', async () => {
        if (!cropperPortrait || batchFiles.length === 0) return;
        
        const zip = new JSZip();
        const data = cropperPortrait.getData(); // 기준 이미지의 좌표값
        
        // 버튼 비활성화 (진행 중 표시)
        const originalText = btnCropPortrait.innerText;
        btnCropPortrait.innerText = '처리 중...';
        btnCropPortrait.disabled = true;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = data.width;
        canvas.height = data.height;

        for (let file of batchFiles) {
            const img = await loadImage(file);
            ctx.clearRect(0,0,canvas.width, canvas.height);
            // 크롭 영역 그리기
            ctx.drawImage(img, data.x, data.y, data.width, data.height, 0, 0, data.width, data.height);

            // 텍스트 합성 로직
            const text = file.name.replace(/\.[^/.]+$/, ""); // 파일 이름(확장자 제외)
            if (text) {
                const fontSize = 40; // 통일된 폰트 크기
                ctx.font = `900 ${fontSize}px "Pretendard", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                
                const x = canvas.width / 2;
                const y = canvas.height - 10;

                // 흰색 테두리 (Outline)
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 10;
                ctx.lineJoin = 'round';
                ctx.strokeText(text, x, y);

                // 지정한 색상 채우기 (Fill)
                ctx.fillStyle = textColorInput.value;
                ctx.fillText(text, x, y);
            }

            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            zip.file(text + "_portrait.png", blob);
        }
        
        const content = await zip.generateAsync({type:"blob"});
        downloadBlob(content, "batch_portraits.zip");
        
        // 버튼 상태 원복
        btnCropPortrait.innerText = originalText;
        btnCropPortrait.disabled = false;
    });

    // ==========================================
    // 3. 컷인 크롭 로직 (셀프 캔버스 & 배경)
    // ==========================================
    const imgCutin = document.getElementById('imgCutin');
    const canvasWInput = document.getElementById('canvasW');
    const canvasHInput = document.getElementById('canvasH');
    const bgColorInput = document.getElementById('bgColor');
    const btnCropCutin = document.getElementById('btnCropCutin');

    document.getElementById('fileCutin').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            imgCutin.src = ev.target.result;
            btnCropCutin.style.display = 'block';
            initCropperCutin();
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function initCropperCutin() {
        if (cropperCutin) cropperCutin.destroy();
        
        const w = parseInt(canvasWInput.value);
        const h = parseInt(canvasHInput.value);

        cropperCutin = new Cropper(imgCutin, {
            aspectRatio: w / h,
            viewMode: 0, // 캔버스 밖으로 이미지가 나갈 수 있도록 설정 (여백 활용용)
            autoCropArea: 0.8,
            background: true,
        });
    }

    // 설정 값 변경 시 크로퍼 비율 업데이트
    [canvasWInput, canvasHInput].forEach(input => {
        input.addEventListener('change', () => { if(cropperCutin) initCropperCutin(); });
    });

    btnCropCutin.addEventListener('click', () => {
        if (!cropperCutin) return;

        const w = parseInt(canvasWInput.value);
        const h = parseInt(canvasHInput.value);
        const color = bgColorInput.value;

        // getCroppedCanvas의 fillColor 옵션을 사용하면 배경색을 채워줍니다.
        const resultCanvas = cropperCutin.getCroppedCanvas({
            width: w,
            height: h,
            fillColor: color, // 투명 영역을 해당 색상으로 채움
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high',
        });

        resultCanvas.toBlob(blob => downloadBlob(blob, 'cutin.png'));
    });

    // ==========================================
    // 유틸리티 함수
    // ==========================================
    function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
    }

    function loadImage(file) {
        return new Promise((res) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => res(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }
</script>

</body>
</html>
