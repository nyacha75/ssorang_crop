<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쏘랑 커팅기</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 20px; background-color: #f0f2f5; color: #333;
        }
        .container {
            max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px;
            border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }
        h2 { text-align: center; margin-top: 0; color: #1e293b; letter-spacing: -0.5px; }
        
        /* 탭 스타일 */
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
        .tab-btn {
            padding: 12px 30px; cursor: pointer; border: none; background: none;
            font-size: 16px; font-weight: 600; color: #94a3b8;
            border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 좌우 분할 레이아웃 */
        .split-layout { display: flex; gap: 25px; align-items: stretch; margin-top: 10px; }
        
        /* 캔버스(미리보기) 영역 래퍼 */
        .split-left-wrapper {
            flex: 0 0 500px; height: 500px; background-color: #f1f5f9;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        
        /* 실제 캔버스 프레임 */
        .canvas-box {
            position: relative;
            outline: 3px solid var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #fff;
        }
        .canvas-box img { display: block; max-width: 100%; }
        
        /* 설정창 영역 */
        .split-right {
            flex: 1; display: flex; flex-direction: column; gap: 15px;
            background: var(--bg); padding: 25px; border-radius: 10px; border: 1px solid #e2e8f0;
            max-height: 800px; overflow-y: auto;
        }

        /* 폼 요소 스타일 */
        .input-group { display: flex; align-items: center; gap: 8px; }
        input[type="number"], input[type="text"] {
            width: 80px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: monospace; font-size: 14px;
        }
        input[type="number"].full-width { width: 120px; }
        input[type="color"] {
            width: 45px; height: 42px; padding: 2px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer;
        }
        input[type="file"] { border: 1px dashed #cbd5e1; padding: 8px; border-radius: 6px; background: #fff; width: 100%; box-sizing: border-box; }
        .help-text { width: 100%; font-size: 13.5px; color: #475569; margin: 0; line-height: 1.5; }
        label { font-weight: bold; font-size: 14px; color: #1e293b; }
        
        /* 버튼 및 슬라이더 */
        .action-btn {
            display: block; width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-top: 10px;
        }
        .action-btn:hover { background-color: var(--primary-hover); }
        .action-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .btn-row { display: flex; gap: 10px; width: 100%; }
        .sub-btn {
            flex: 1; background-color: #e2e8f0; color: #334155; border: none; padding: 10px;
            border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .sub-btn:hover { background-color: #cbd5e1; }
        input[type="range"] { flex: 1; cursor: pointer; }
        .file-count { font-size: 14px; font-weight: bold; color: var(--primary); }

        /* 콜라주 생성기 전용 박스 */
        .collage-box {
            background-color: #fff; border: 2px solid #e2e8f0; border-radius: 10px;
            padding: 18px; margin-top: 10px; border-left: 5px solid #8b5cf6;
        }
        .collage-box h3 { margin: 0 0 15px 0; font-size: 16px; color: #4c1d95; }
        
        /* Cropper.js 커스텀 설정 */
        .cropper-view-box { outline: none !important; position: relative; }
        .cropper-modal { opacity: 0 !important; }
        .cropper-bg { background: transparent !important; }
        .cropper-point, .cropper-line { display: none !important; }
        .cropper-face { background-color: transparent !important; opacity: 0 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>✂️ 쏘랑 커팅기</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tab-headshot')">1. 두상(인장)</button>
        <button class="tab-btn" onclick="switchTab('tab-portrait')">2. 반신 스탠딩</button>
        <button class="tab-btn" onclick="switchTab('tab-cutin')">3. 컷인</button>
    </div>

    <div id="tab-headshot" class="tab-content active">
        <div class="split-layout">
            <div class="split-left-wrapper">
                <div class="canvas-box" id="hsBox"><img id="imgHeadshot"></div>
            </div>
            <div class="split-right">
                <div>
                    <label style="display: block; margin-bottom: 8px;">1. 이미지 불러오기 (단일)</label>
                    <input type="file" id="fileHeadshot" accept="image/*">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">2. 배경 설정 (여백 발생 시)</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="hsTransparent" checked>
                        <label for="hsTransparent" style="cursor: pointer;">배경 투명하게 (PNG)</label>
                    </div>
                    <div class="input-group" id="hsColorGroup" style="opacity: 0.5; pointer-events: none;">
                        <input type="color" id="hsColorPicker" value="#ffffff">
                        <input type="text" id="hsHexInput" value="#ffffff" maxlength="7">
                    </div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">3. 보조선 및 크기 조절</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="hsGuideCircle">
                        <label for="hsGuideCircle" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">원형 가이드</label>
                        <input type="checkbox" id="hsGuideGrid" style="margin-left: 10px;">
                        <label for="hsGuideGrid" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">격자(3x3) 가이드</label>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="hsImgW" class="full-width" placeholder="자동">
                        <span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group">
                        <input type="checkbox" id="hsFineZoom">
                        <label for="hsFineZoom" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">마우스 휠 감도 세밀하게</label>
                    </div>
                </div>
                <button id="btnCropHeadshot" class="action-btn" style="display:none;">1:1 두상 다운로드</button>
            </div>
        </div>
    </div>

    <div id="tab-portrait" class="tab-content">
        <div class="split-layout">
            <div class="split-left-wrapper">
                <div class="canvas-box" id="ptBox"><img id="imgPortrait"></div>
            </div>
            <div class="split-right">
                <div>
                    <label style="display: block; margin-bottom: 8px;">1. 표정 파일 모두 불러오기 (다중 선택)</label>
                    <input type="file" id="filePortrait" accept="image/*" multiple>
                    <div id="portraitFileCount" class="file-count" style="margin-top: 8px;">선택된 파일: 없음</div>
                </div>
                <div class="input-group">
                    <div>
                        <label style="display: block; margin-bottom: 8px;">캔버스 가로 (px)</label>
                        <input type="number" id="portraitW" value="460">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px;">캔버스 세로 (px)</label>
                        <input type="number" id="portraitH" value="800">
                    </div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">2. 보조선 및 크기 조절</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="ptGuideGrid">
                        <label for="ptGuideGrid" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">격자(3x3) 가이드</label>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="ptImgW" class="full-width" placeholder="자동">
                        <span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group">
                        <input type="checkbox" id="ptFineZoom">
                        <label for="ptFineZoom" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">마우스 휠 감도 세밀하게</label>
                    </div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">3. 회전 각도 조절</label>
                    <div class="input-group" style="width: 100%;">
                        <input type="range" id="portraitRotateSlider" min="-180" max="180" value="0">
                        <span id="rotateValue" style="font-family: monospace; font-weight: bold; width: 45px; text-align: right;">0°</span>
                    </div>
                    <div class="btn-row" style="margin-top: 10px;">
                        <button class="sub-btn" onclick="rotatePortrait(-90)">↺ -90°</button>
                        <button class="sub-btn" onclick="rotatePortrait(90)">↻ +90°</button>
                        <button class="sub-btn" onclick="resetPortraitTransform()">🔄 초기화</button>
                    </div>
                </div>
                
                <button id="btnCropPortrait" class="action-btn" style="display:none;">전체 파일 개별 추출 (ZIP)</button>

                <hr style="width: 100%; border: 1px solid #e2e8f0; margin: 5px 0;">

                <div class="collage-box">
                    <h3>🖼️ 포트레이트 모아보기 생성기</h3>
                    <p class="help-text" style="margin-bottom: 15px;">위에서 지정한 표정들을 모아 하나의 이미지로 추출합니다. 파일 이름이 하단에 삽입됩니다.</p>
                    
                    <label style="display: block; margin-bottom: 8px; font-size: 13px;">옆에 띄울 스탠딩 이미지 (선택)</label>
                    <input type="file" id="collageSideImg" accept="image/*" style="margin-bottom: 12px;">

                    <div class="input-group" style="margin-bottom: 12px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 13px;">배치 열 수</label>
                            <input type="number" id="collageCols" value="3" style="width: 60px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-size: 13px;">글자 색상</label>
                            <input type="color" id="collageTextColor" value="#6b21a8" style="width: 60px;">
                        </div>
                    </div>
                    
                    <button id="btnGenerateCollage" class="action-btn" style="background-color: #8b5cf6; margin-top: 0;">콜라주 이미지 다운로드</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-cutin" class="tab-content">
        <div class="split-layout">
            <div class="split-left-wrapper">
                <div class="canvas-box" id="ciBox"><img id="imgCutin"></div>
            </div>
            <div class="split-right">
                <div>
                    <label style="display: block; margin-bottom: 8px;">1. 이미지 불러오기</label>
                    <input type="file" id="fileCutin" accept="image/*">
                </div>
                <div class="input-group">
                    <div>
                        <label style="display: block; margin-bottom: 8px;">캔버스 가로 (px)</label>
                        <input type="number" id="cutinW" value="1200">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px;">캔버스 세로 (px)</label>
                        <input type="number" id="cutinH" value="400">
                    </div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">배경 설정 (여백 발생 시)</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="ciTransparent" checked>
                        <label for="ciTransparent" style="cursor: pointer;">배경 투명하게 (PNG)</label>
                    </div>
                    <div class="input-group" id="ciColorGroup" style="opacity: 0.5; pointer-events: none;">
                        <input type="color" id="ciColorPicker" value="#ffffff">
                        <input type="text" id="ciHexInput" value="#ffffff" maxlength="7">
                    </div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px;">보조선 및 크기 조절</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="ciGuideGrid">
                        <label for="ciGuideGrid" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">격자(3x3) 가이드</label>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="ciImgW" class="full-width" placeholder="자동">
                        <span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group">
                        <input type="checkbox" id="ciFineZoom">
                        <label for="ciFineZoom" style="cursor: pointer; font-weight: normal; font-size: 13.5px;">마우스 휠 감도 세밀하게</label>
                    </div>
                </div>
                <button id="btnCropCutin" class="action-btn" style="display:none;">컷인 이미지 다운로드</button>
            </div>
        </div>
    </div>
</div>

<template id="tpl-grid">
    <svg class="guide-grid" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:none; z-index:999;">
        <line x1="33.33" y1="0" x2="33.33" y2="100" stroke="#ff0044" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
        <line x1="66.66" y1="0" x2="66.66" y2="100" stroke="#ff0044" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
        <line x1="0" y1="33.33" x2="100" y2="33.33" stroke="#ff0044" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
        <line x1="0" y1="66.66" x2="100" y2="66.66" stroke="#ff0044" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
    </svg>
</template>
<template id="tpl-circle">
    <svg class="guide-circle" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:none; z-index:999;">
        <circle cx="50" cy="50" r="49.5" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="3" opacity="0.8"/>
    </svg>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    let cropperHeadshot, cropperPortrait, cropperCutin;
    let portraitFiles = []; 

    const baseCropperOptions = {
        viewMode: 0, dragMode: 'move', autoCropArea: 1, cropBoxMovable: false, cropBoxResizable: false,
        toggleDragModeOnDblclick: false, guides: false, center: true, wheelZoomRatio: 0.1
    };

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const tabBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabId));
        if(tabBtn) tabBtn.classList.add('active');
    }

    function updateCanvasBoxSize(boxElement, targetW, targetH, maxDim = 450) {
        if (!targetW || !targetH) return;
        const ratio = targetW / targetH;
        if (ratio > 1) {
            boxElement.style.width = maxDim + 'px';
            boxElement.style.height = (maxDim / ratio) + 'px';
        } else {
            boxElement.style.height = maxDim + 'px';
            boxElement.style.width = (maxDim * ratio) + 'px';
        }
    }

    function setupColorControls(chkId, groupId, pickerId, hexId) {
        const chk = document.getElementById(chkId);
        const group = document.getElementById(groupId);
        const picker = document.getElementById(pickerId);
        const hex = document.getElementById(hexId);

        chk.addEventListener('change', () => {
            if(chk.checked) {
                group.style.opacity = '0.5';
                group.style.pointerEvents = 'none';
            } else {
                group.style.opacity = '1';
                group.style.pointerEvents = 'auto';
            }
        });

        picker.addEventListener('input', (e) => { hex.value = e.target.value; });
        hex.addEventListener('input', (e) => {
            let val = e.target.value;
            if (!val.startsWith('#')) { val = '#' + val; e.target.value = val; }
            if (/^#[0-9A-F]{6}$/i.test(val)) { picker.value = val; }
        });
    }

    function bindZoomInput(cropperInstance, inputEl) {
        cropperInstance.element.addEventListener('zoom', (e) => {
            const naturalW = cropperInstance.getImageData().naturalWidth;
            inputEl.value = Math.round(naturalW * e.detail.ratio);
        });

        const changeHandler = (e) => {
            const newW = parseInt(e.target.value);
            if (!newW || !cropperInstance) return;
            const naturalW = cropperInstance.getImageData().naturalWidth;
            cropperInstance.zoomTo(newW / naturalW);
        };
        inputEl.replaceWith(inputEl.cloneNode(true));
        const newEl = document.getElementById(inputEl.id);
        newEl.addEventListener('change', changeHandler);
        return newEl;
    }

    function initZoomInputVal(cropperInstance, inputElId) {
        const el = document.getElementById(inputElId);
        const data = cropperInstance.getImageData();
        el.value = Math.round(data.width);
        return bindZoomInput(cropperInstance, el);
    }

    ['hsFineZoom', 'ptFineZoom', 'ciFineZoom'].forEach(id => {
        document.getElementById(id).addEventListener('change', function(e) {
            const ratio = e.target.checked ? 0.03 : 0.1;
            if (id === 'hsFineZoom' && cropperHeadshot) cropperHeadshot.options.wheelZoomRatio = ratio;
            if (id === 'ptFineZoom' && cropperPortrait) cropperPortrait.options.wheelZoomRatio = ratio;
            if (id === 'ciFineZoom' && cropperCutin) cropperCutin.options.wheelZoomRatio = ratio;
        });
    });

    function injectGuides(cropperInstance, tabId) {
        const viewBox = cropperInstance.element.nextElementSibling.querySelector('.cropper-view-box');
        if (!viewBox) return;

        if (!viewBox.querySelector('.guide-grid')) {
            const gridSvg = document.getElementById('tpl-grid').content.cloneNode(true);
            viewBox.appendChild(gridSvg);
        }
        if (tabId === 'tab-headshot' && !viewBox.querySelector('.guide-circle')) {
            const circleSvg = document.getElementById('tpl-circle').content.cloneNode(true);
            viewBox.appendChild(circleSvg);
        }
        updateGuides(tabId);
    }

    function updateGuides(tabId) {
        let viewBox;
        if (tabId === 'tab-headshot') viewBox = document.querySelector('#hsBox .cropper-view-box');
        else if (tabId === 'tab-portrait') viewBox = document.querySelector('#ptBox .cropper-view-box');
        else if (tabId === 'tab-cutin') viewBox = document.querySelector('#ciBox .cropper-view-box');
        if (!viewBox) return;

        const grid = viewBox.querySelector('.guide-grid');
        if (grid) {
            let isGridChecked = false;
            if (tabId === 'tab-headshot') isGridChecked = document.getElementById('hsGuideGrid').checked;
            else if (tabId === 'tab-portrait') isGridChecked = document.getElementById('ptGuideGrid').checked;
            else if (tabId === 'tab-cutin') isGridChecked = document.getElementById('ciGuideGrid').checked;
            grid.style.display = isGridChecked ? 'block' : 'none';
        }
        if (tabId === 'tab-headshot') {
            const circle = viewBox.querySelector('.guide-circle');
            if (circle) {
                const isCircleChecked = document.getElementById('hsGuideCircle').checked;
                circle.style.display = isCircleChecked ? 'block' : 'none';
            }
        }
    }

    document.getElementById('hsGuideCircle').addEventListener('change', () => updateGuides('tab-headshot'));
    document.getElementById('hsGuideGrid').addEventListener('change', () => updateGuides('tab-headshot'));
    document.getElementById('ptGuideGrid').addEventListener('change', () => updateGuides('tab-portrait'));
    document.getElementById('ciGuideGrid').addEventListener('change', () => updateGuides('tab-cutin'));

    function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    function loadImage(file) {
        return new Promise((res) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => res(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // ====================================================
    // 초기 프레임 렌더링
    // ====================================================
    const hsBox = document.getElementById('hsBox');
    const ptBox = document.getElementById('ptBox');
    const ciBox = document.getElementById('ciBox');
    const ptWInput = document.getElementById('portraitW');
    const ptHInput = document.getElementById('portraitH');
    const ciWInput = document.getElementById('cutinW');
    const ciHInput = document.getElementById('cutinH');

    updateCanvasBoxSize(hsBox, 1, 1);
    updateCanvasBoxSize(ptBox, parseInt(ptWInput.value) || 460, parseInt(ptHInput.value) || 800);
    updateCanvasBoxSize(ciBox, parseInt(ciWInput.value) || 1200, parseInt(ciHInput.value) || 400);

    // ====================================================
    // 1. 두상(인장) 크롭
    // ====================================================
    setupColorControls('hsTransparent', 'hsColorGroup', 'hsColorPicker', 'hsHexInput');
    
    document.getElementById('fileHeadshot').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('imgHeadshot').src = ev.target.result;
            document.getElementById('btnCropHeadshot').style.display = 'block';
            if (cropperHeadshot) cropperHeadshot.destroy();
            
            const zoomRatio = document.getElementById('hsFineZoom').checked ? 0.03 : 0.1;
            cropperHeadshot = new Cropper(document.getElementById('imgHeadshot'), { 
                ...baseCropperOptions, aspectRatio: 1, wheelZoomRatio: zoomRatio,
                ready() { 
                    initZoomInputVal(cropperHeadshot, 'hsImgW'); 
                    injectGuides(cropperHeadshot, 'tab-headshot');
                }
            });
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    document.getElementById('btnCropHeadshot').addEventListener('click', () => {
        if (!cropperHeadshot) return;
        const isTrans = document.getElementById('hsTransparent').checked;
        const color = isTrans ? 'transparent' : document.getElementById('hsColorPicker').value;
        const canvas = cropperHeadshot.getCroppedCanvas({
            fillColor: color,
            imageSmoothingEnabled: true, imageSmoothingQuality: 'high'
        });
        canvas.toBlob(blob => downloadBlob(blob, 'headshot.png'));
    });

    // ====================================================
    // 2. 반신 스탠딩 크롭 (동기화)
    // ====================================================
    function initPortraitCropper() {
        if (cropperPortrait) cropperPortrait.destroy();
        const w = parseInt(ptWInput.value) || 460;
        const h = parseInt(ptHInput.value) || 800;
        const zoomRatio = document.getElementById('ptFineZoom').checked ? 0.03 : 0.1;
        
        cropperPortrait = new Cropper(document.getElementById('imgPortrait'), {
            ...baseCropperOptions, aspectRatio: w / h, rotatable: true, wheelZoomRatio: zoomRatio,
            ready() { 
                initZoomInputVal(cropperPortrait, 'ptImgW'); 
                injectGuides(cropperPortrait, 'tab-portrait');
            }
        });
    }

    document.getElementById('filePortrait').addEventListener('change', function(e) {
        portraitFiles = Array.from(e.target.files);
        if (portraitFiles.length === 0) return;
        document.getElementById('portraitFileCount').innerText = `선택된 파일: ${portraitFiles.length}개`;
        document.getElementById('btnCropPortrait').style.display = 'block';

        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('imgPortrait').src = ev.target.result;
            document.getElementById('portraitRotateSlider').value = 0;
            document.getElementById('rotateValue').innerText = "0°";
            initPortraitCropper();
        };
        reader.readAsDataURL(portraitFiles[0]);
    });

    [ptWInput, ptHInput].forEach(input => {
        input.addEventListener('input', () => { 
            const w = parseInt(ptWInput.value) || 460;
            const h = parseInt(ptHInput.value) || 800;
            updateCanvasBoxSize(ptBox, w, h);
            if(cropperPortrait) initPortraitCropper(); 
        });
    });

    document.getElementById('portraitRotateSlider').addEventListener('input', function(e) {
        const val = parseInt(e.target.value, 10);
        document.getElementById('rotateValue').innerText = `${val}°`;
        if (cropperPortrait) cropperPortrait.rotateTo(val);
    });
    function rotatePortrait(degree) {
        if (!cropperPortrait) return;
        let current = parseInt(document.getElementById('portraitRotateSlider').value, 10);
        let next = current + degree;
        if (next > 180) next -= 360;
        if (next < -180) next += 360;
        document.getElementById('portraitRotateSlider').value = next;
        document.getElementById('rotateValue').innerText = `${next}°`;
        cropperPortrait.rotateTo(next);
    }
    function resetPortraitTransform() {
        if (!cropperPortrait) return;
        document.getElementById('portraitRotateSlider').value = 0;
        document.getElementById('rotateValue').innerText = "0°";
        cropperPortrait.reset();
        document.getElementById('ptImgW').value = Math.round(cropperPortrait.getImageData().width);
    }

    document.getElementById('btnCropPortrait').addEventListener('click', async () => {
        if (!cropperPortrait || portraitFiles.length === 0) return;
        
        const targetW = parseInt(ptWInput.value);
        const targetH = parseInt(ptHInput.value);
        const masterData = cropperPortrait.getData(); 
        const zip = new JSZip();

        const btn = document.getElementById('btnCropPortrait');
        const originalText = btn.innerText;
        btn.innerText = '압축 파일 생성 중...';
        btn.disabled = true;

        const offscreenContainer = document.createElement('div');
        offscreenContainer.style.position = 'absolute';
        offscreenContainer.style.top = '-9999px';
        offscreenContainer.style.width = '1000px';
        document.body.appendChild(offscreenContainer);

        for (let file of portraitFiles) {
            const imgObj = await loadImage(file);
            const hiddenImg = document.createElement('img');
            hiddenImg.src = imgObj.src;
            hiddenImg.style.maxWidth = '100%';
            offscreenContainer.appendChild(hiddenImg);

            await new Promise(resolve => {
                const tempCropper = new Cropper(hiddenImg, {
                    ...baseCropperOptions,
                    aspectRatio: targetW / targetH,
                    ready() {
                        tempCropper.setData(masterData);
                        const canvas = tempCropper.getCroppedCanvas({
                            width: targetW, height: targetH, fillColor: 'transparent',
                            imageSmoothingEnabled: true, imageSmoothingQuality: 'high'
                        });

                        canvas.toBlob(blob => {
                            const cleanName = file.name.replace(/\.[^/.]+$/, "") + "_portrait.png";
                            zip.file(cleanName, blob);
                            tempCropper.destroy();
                            offscreenContainer.innerHTML = ''; 
                            resolve();
                        }, 'image/png');
                    }
                });
            });
        }
        
        document.body.removeChild(offscreenContainer);
        const content = await zip.generateAsync({ type: "blob" });
        downloadBlob(content, "synchronized_portraits.zip");

        btn.innerText = originalText;
        btn.disabled = false;
    });

    // ★ 콜라주 생성기 로직 ★
    document.getElementById('btnGenerateCollage').addEventListener('click', async () => {
        if (!cropperPortrait || portraitFiles.length === 0) {
            alert("먼저 위에서 표정 파일들을 불러오고 영역을 지정해주세요.");
            return;
        }

        const btn = document.getElementById('btnGenerateCollage');
        const originalText = btn.innerText;
        btn.innerText = '콜라주 생성 중... (잠시만 기다려주세요)';
        btn.disabled = true;

        const targetW = parseInt(ptWInput.value) || 460;
        const targetH = parseInt(ptHInput.value) || 800;
        const masterData = cropperPortrait.getData();
        const cols = parseInt(document.getElementById('collageCols').value) || 3;
        const textColor = document.getElementById('collageTextColor').value;
        const gap = 15; // 이미지 간 간격 (px)

        // 1. 모든 포트레이트 추출 및 텍스트 렌더링
        const portraitCanvases = [];
        const offscreenContainer = document.createElement('div');
        offscreenContainer.style.position = 'absolute';
        offscreenContainer.style.top = '-9999px';
        offscreenContainer.style.width = '1000px';
        document.body.appendChild(offscreenContainer);

        for (let file of portraitFiles) {
            const imgObj = await loadImage(file);
            const hiddenImg = document.createElement('img');
            hiddenImg.src = imgObj.src;
            hiddenImg.style.maxWidth = '100%';
            offscreenContainer.appendChild(hiddenImg);

            await new Promise(resolve => {
                const tempCropper = new Cropper(hiddenImg, {
                    ...baseCropperOptions,
                    aspectRatio: targetW / targetH,
                    ready() {
                        tempCropper.setData(masterData);
                        const canvas = tempCropper.getCroppedCanvas({
                            width: targetW, height: targetH, fillColor: 'transparent',
                            imageSmoothingEnabled: true, imageSmoothingQuality: 'high'
                        });

                        const ctx = canvas.getContext('2d');
                        const text = file.name.replace(/\.[^/.]+$/, ""); // 파일 이름
                        if (text) {
                            // 글자 크기는 캔버스 가로의 12% 정도로 자동 조절 (최소 20px)
                            const fontSize = Math.max(20, Math.floor(targetW * 0.12));
                            ctx.font = `900 ${fontSize}px "Pretendard", sans-serif`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            const x = canvas.width / 2;
                            const y = canvas.height - (fontSize * 0.2);

                            ctx.strokeStyle = '#ffffff';
                            ctx.lineWidth = Math.max(4, fontSize * 0.25);
                            ctx.lineJoin = 'round';
                            ctx.strokeText(text, x, y);

                            ctx.fillStyle = textColor;
                            ctx.fillText(text, x, y);
                        }

                        portraitCanvases.push(canvas);
                        tempCropper.destroy();
                        offscreenContainer.innerHTML = ''; 
                        resolve();
                    }
                });
            });
        }
        document.body.removeChild(offscreenContainer);

        // 2. 전체 레이아웃 크기 계산
        const rows = Math.ceil(portraitCanvases.length / cols);
        const gridW = cols * targetW + (cols - 1) * gap;
        const gridH = rows * targetH + (rows - 1) * gap;

        // 3. 옆에 띄울 스탠딩 이미지 처리
        let sideImg = null;
        let sideW = 0;
        const sideFile = document.getElementById('collageSideImg').files[0];
        if (sideFile) {
            sideImg = await loadImage(sideFile);
            const scale = gridH / sideImg.naturalHeight;
            sideW = sideImg.naturalWidth * scale; // 높이를 그리드 전체 높이에 맞춰서 스케일업/다운
        }

        // 4. 최종 캔버스 조립
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = (sideImg ? sideW + gap : 0) + gridW + (gap * 2); // 좌우 여백 포함
        finalCanvas.height = gridH + (gap * 2); // 상하 여백 포함
        const finalCtx = finalCanvas.getContext('2d');

        // 배경색 (흰색 고정)
        finalCtx.fillStyle = '#ffffff';
        finalCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

        const offsetX = gap + (sideImg ? sideW + gap : 0);

        // 스탠딩 원본 그리기
        if (sideImg) {
            finalCtx.drawImage(sideImg, gap, gap, sideW, gridH);
        }

        // 그리드 그리기
        portraitCanvases.forEach((pCanvas, index) => {
            const col = index % cols;
            const row = Math.floor(index / cols);
            const x = offsetX + col * (targetW + gap);
            const y = gap + row * (targetH + gap);
            finalCtx.drawImage(pCanvas, x, y);
        });

        // 다운로드 실행
        finalCanvas.toBlob(blob => {
            downloadBlob(blob, 'portrait_collage.png');
            btn.innerText = originalText;
            btn.disabled = false;
        });
    });

    // ====================================================
    // 3. 컷인 크롭
    // ====================================================
    setupColorControls('ciTransparent', 'ciColorGroup', 'ciColorPicker', 'ciHexInput');

    function initCutinCropper() {
        if (cropperCutin) cropperCutin.destroy();
        const w = parseInt(ciWInput.value) || 1200;
        const h = parseInt(ciHInput.value) || 400;
        const zoomRatio = document.getElementById('ciFineZoom').checked ? 0.03 : 0.1;
        
        cropperCutin = new Cropper(document.getElementById('imgCutin'), {
            ...baseCropperOptions, aspectRatio: w / h, wheelZoomRatio: zoomRatio,
            ready() { 
                initZoomInputVal(cropperCutin, 'ciImgW'); 
                injectGuides(cropperCutin, 'tab-cutin');
            }
        });
    }

    document.getElementById('fileCutin').addEventListener('change', function(e) {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('imgCutin').src = ev.target.result;
            document.getElementById('btnCropCutin').style.display = 'block';
            initCutinCropper();
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    [ciWInput, ciHInput].forEach(input => {
        input.addEventListener('input', () => { 
            const w = parseInt(ciWInput.value) || 1200;
            const h = parseInt(ciHInput.value) || 400;
            updateCanvasBoxSize(ciBox, w, h);
            if(cropperCutin) initCutinCropper(); 
        });
    });

    document.getElementById('btnCropCutin').addEventListener('click', () => {
        if (!cropperCutin) return;
        const w = parseInt(ciWInput.value);
        const h = parseInt(ciHInput.value);
        const isTrans = document.getElementById('ciTransparent').checked;
        const color = isTrans ? 'transparent' : document.getElementById('ciColorPicker').value;
        
        const canvas = cropperCutin.getCroppedCanvas({
            width: w, height: h, fillColor: color,
            imageSmoothingEnabled: true, imageSmoothingQuality: 'high'
        });
        canvas.toBlob(blob => downloadBlob(blob, 'cutin.png'));
    });
</script>

</body>
