<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쏘랑 커팅기</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 20px; background-color: #f0f2f5; color: #333;
        }
        .container {
            max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px;
            border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 20px;
        }
        h2 { text-align: center; margin-top: 0; color: #1e293b; letter-spacing: -0.5px; }
        
        .tabs { display: flex; justify-content: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
        .tab-btn {
            padding: 12px 30px; cursor: pointer; border: none; background: none;
            font-size: 16px; font-weight: 600; color: #94a3b8;
            border-bottom: 3px solid transparent; transition: 0.3s;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .split-layout { display: flex; gap: 25px; align-items: stretch; margin-top: 10px; }
        .split-left-wrapper {
            flex: 0 0 500px; height: 500px; background-color: #f1f5f9;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
        }
        .canvas-box {
            position: relative; outline: 3px solid var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;
            background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; background-color: #fff;
        }
        .canvas-box img { display: block; max-width: 100%; }
        
        .split-right {
            flex: 1; display: flex; flex-direction: column; gap: 15px;
            background: var(--bg); padding: 25px; border-radius: 10px; border: 1px solid #e2e8f0;
            max-height: 800px; overflow-y: auto;
        }
        .input-group { display: flex; align-items: center; gap: 8px; }
        input[type="number"], input[type="text"] { width: 80px; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: monospace; font-size: 14px; }
        input.full-width { width: 120px; }
        input[type="color"] { width: 45px; height: 42px; padding: 2px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; }
        input[type="file"] { border: 1px dashed #cbd5e1; padding: 8px; border-radius: 6px; background: #fff; width: 100%; box-sizing: border-box; }
        label { font-weight: bold; font-size: 14px; color: #1e293b; display: block; margin-bottom: 8px; }
        
        .action-btn {
            display: block; width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-top: auto;
        }
        .action-btn:hover:not(:disabled) { background-color: var(--primary-hover); }
        .action-btn:disabled { background-color: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        
        .btn-row { display: flex; gap: 10px; width: 100%; }
        .sub-btn {
            flex: 1; background-color: #e2e8f0; color: #334155; border: none; padding: 10px;
            border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .sub-btn:hover { background-color: #cbd5e1; }
        input[type="range"] { flex: 1; cursor: pointer; }
        .file-count { font-size: 14px; font-weight: bold; color: var(--primary); margin-top: 8px; }

        .divider { border: 0; border-top: 2px dashed #cbd5e1; margin: 30px 0; width: 100%; }

        .collage-preview-wrapper { margin-top: 20px; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 10px; background: #f8fafc; }
        .collage-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        .collage-item { 
            background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; gap: 8px; 
            cursor: grab; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s;
        }
        .collage-item:active { cursor: grabbing; }
        .collage-item img { max-width: 100%; border-radius: 4px; border: 1px solid #eee; pointer-events: none; }
        .collage-item input { width: 90%; text-align: center; font-size: 13px; font-weight: bold; padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; color: var(--primary); }
        .item-controls { display: flex; gap: 5px; width: 100%; }
        .item-controls button { flex: 1; padding: 6px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 4px; cursor: pointer; font-weight: bold; color: var(--primary); }
        .item-controls button:hover { background: #e2e8f0; }

        .cropper-view-box { outline: none !important; position: relative; }
        .cropper-modal, .cropper-bg, .cropper-face { background: transparent !important; opacity: 0 !important; }
        .cropper-point, .cropper-line { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>✂️ 쏘랑 커팅기</h2>
    
    <div class="tabs">
        <button class="tab-btn active" data-target="tab-headshot">1. 두상(인장)</button>
        <button class="tab-btn" data-target="tab-portrait">2. 반신 스탠딩</button>
        <button class="tab-btn" data-target="tab-cutin">3. 컷인</button>
    </div>

    <div id="tab-headshot" class="tab-content active">
        <div class="split-layout">
            <div class="split-left-wrapper"><div class="canvas-box" id="hsBox"></div></div>
            <div class="split-right">
                <div>
                    <label>1. 이미지 불러오기 (단일)</label>
                    <input type="file" id="fileHeadshot" accept="image/*">
                </div>
                <div>
                    <label>2. 배경 설정 (여백 발생 시)</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="hsTransparent" checked>
                        <label for="hsTransparent" style="margin:0; cursor:pointer; font-weight:normal;">배경 투명하게 (PNG)</label>
                    </div>
                    <div class="input-group" id="hsColorGroup" style="opacity: 0.5; pointer-events: none;">
                        <input type="color" id="hsColorPicker" value="#ffffff">
                        <input type="text" id="hsHexInput" value="#ffffff" maxlength="7">
                    </div>
                </div>
                <div>
                    <label>3. 보조선 및 크기 조절</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="hsGuideCircle"><label for="hsGuideCircle" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">원형 가이드 (트위터 꽉 차게)</label>
                        <input type="checkbox" id="hsGuideGrid" style="margin-left:10px;"><label for="hsGuideGrid" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">격자 가이드</label>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="hsImgW" class="full-width" placeholder="자동"><span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group">
                        <input type="checkbox" id="hsFineZoom"><label for="hsFineZoom" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">마우스 휠 감도 세밀하게 (기본: 확확 축소/확대)</label>
                    </div>
                </div>
                <button id="btnCropHeadshot" class="action-btn" disabled>1:1 두상 다운로드</button>
            </div>
        </div>
    </div>

    <div id="tab-portrait" class="tab-content">
        
        <div style="background: #fff; padding: 20px; border-radius: 10px; border: 2px dashed #cbd5e1; margin-bottom: 25px; text-align: center;">
            <label style="font-size: 16px; color: var(--primary);">📥 표정 파일 모두 불러오기 (다중 선택)</label>
            <input type="file" id="filePortrait" accept="image/*" multiple style="margin-top: 10px; border: none; background: #f8fafc; padding: 10px; width: 100%;">
            <div id="portraitFileCount" class="file-count" style="margin-top: 10px;">선택된 파일: 없음</div>
        </div>

        <h3 style="color: var(--primary); margin-bottom: 10px;">2-1. 일괄 추출 (ZIP)</h3>
        <p class="help-text" style="margin-bottom: 15px;">여러 장의 표정을 동일한 좌표로 잘라 <strong style="color:var(--primary);">원본 파일명</strong> 그대로 개별 투명 PNG로 추출합니다.</p>
        <div class="split-layout">
            <div class="split-left-wrapper"><div class="canvas-box" id="ptBox"></div></div>
            <div class="split-right">
                <div class="input-group">
                    <div><label>캔버스 가로 (px)</label><input type="number" id="portraitW" value="460"></div>
                    <div><label>캔버스 세로 (px)</label><input type="number" id="portraitH" value="800"></div>
                    <div style="margin-left: 5px; margin-top: 25px;">
                        <input type="checkbox" id="ptSquareToggle">
                        <label for="ptSquareToggle" style="display:inline; cursor:pointer; font-weight:normal; font-size:13px;">1:1 고정</label>
                    </div>
                </div>
                <div>
                    <label>보조선 및 크기 조절</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="ptGuideGrid"><label for="ptGuideGrid" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">격자 가이드 (코코포리아 1칸 비율)</label>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="ptImgW" class="full-width" placeholder="자동"><span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group">
                        <input type="checkbox" id="ptFineZoom"><label for="ptFineZoom" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">마우스 휠 감도 세밀하게</label>
                    </div>
                </div>
                <div>
                    <label>회전 각도 조절</label>
                    <div class="input-group" style="width: 100%;">
                        <input type="range" id="portraitRotateSlider" min="-180" max="180" value="0">
                        <span id="rotateValue" style="font-family: monospace; font-weight: bold; width: 45px; text-align: right;">0°</span>
                    </div>
                    <div class="btn-row" style="margin-top: 10px;">
                        <button class="sub-btn" onclick="rotateManual('pt', -90)">↺ -90°</button>
                        <button class="sub-btn" onclick="rotateManual('pt', 90)">↻ +90°</button>
                        <button class="sub-btn" onclick="resetManual('pt')">🔄 초기화</button>
                    </div>
                </div>
                <button id="btnCropPortrait" class="action-btn" disabled>전체 파일 개별 추출 (ZIP)</button>
            </div>
        </div>

        <hr class="divider">

        <h3 style="color: var(--primary); margin-bottom: 10px;">2-2. 콜라주 모아보기</h3>
        <p class="help-text" style="margin-bottom: 15px;">위와 독립적으로 새롭게 크롭(기본 정사각형)하여, <strong style="color:var(--primary);">_(언더바) 뒤 표정 이름</strong>이 들어간 모음집을 만듭니다.</p>
        <div class="split-layout">
            <div class="split-left-wrapper"><div class="canvas-box" id="colBox"></div></div>
            <div class="split-right">
                <div class="input-group" style="align-items: flex-end;">
                    <div><label>자르기 가로(px)</label><input type="number" id="colW" value="460"></div>
                    <div><label>자르기 세로(px)</label><input type="number" id="colH" value="460" disabled></div>
                    <div style="margin-bottom: 10px; margin-left: 5px;">
                        <input type="checkbox" id="colSquareToggle" checked>
                        <label for="colSquareToggle" style="display:inline; cursor:pointer; font-size:13px; font-weight:normal;">1:1 고정</label>
                    </div>
                </div>
                <div>
                    <label>크기 조절 및 회전</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="colImgW" class="full-width" placeholder="자동"><span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="colFineZoom"><label for="colFineZoom" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">마우스 휠 감도 세밀하게</label>
                    </div>
                    <div class="input-group" style="width: 100%; margin-top: 10px;">
                        <input type="range" id="colRotateSlider" min="-180" max="180" value="0">
                        <span id="colRotateValue" style="font-family: monospace; font-weight: bold; width: 45px; text-align: right;">0°</span>
                    </div>
                </div>
                <div>
                    <label>레이아웃 & 배경 설정</label>
                    <div class="input-group" style="margin-bottom: 12px;">
                        <div><label style="font-size: 13px; margin-bottom:5px;">배치 열 수</label><input type="number" id="colCols" value="3" style="width: 60px;"></div>
                        <div><label style="font-size: 13px; margin-bottom:5px;">글자 색상</label><input type="color" id="colTextColor" value="#2563eb" style="width: 60px;"></div>
                    </div>
                    <label style="font-size: 13px; margin-bottom:5px;">옆에 띄울 스탠딩 원본 (선택)</label>
                    <input type="file" id="colSideImg" accept="image/*">
                </div>
                <button id="btnGeneratePreview" class="action-btn" disabled>✨ 하단에 그리드 미리보기 생성</button>
            </div>
        </div>
        
        <div class="collage-preview-wrapper" id="collagePreviewArea" style="display: none;">
            <h3 style="margin: 0 0 10px 0; color: var(--primary); font-size: 16px;">🔍 그리드 확인 (드래그 순서 변경 & 직접 텍스트 수정 가능)</h3>
            <div class="collage-grid" id="collageGrid"></div>
            <button id="btnDownloadCollage" class="action-btn" style="margin-top: 20px;">콜라주 최종 다운로드</button>
        </div>
    </div>

    <div id="tab-cutin" class="tab-content">
        <div class="split-layout">
            <div class="split-left-wrapper"><div class="canvas-box" id="ciBox"></div></div>
            <div class="split-right">
                <div>
                    <label>1. 이미지 불러오기</label>
                    <input type="file" id="fileCutin" accept="image/*">
                </div>
                <div class="input-group">
                    <div><label>캔버스 가로 (px)</label><input type="number" id="cutinW" value="1200"></div>
                    <div><label>캔버스 세로 (px)</label><input type="number" id="cutinH" value="400"></div>
                </div>
                <div>
                    <label>배경 설정 (여백 발생 시)</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="ciTransparent" checked>
                        <label for="ciTransparent" style="margin:0; cursor:pointer; font-weight:normal;">배경 투명하게 (PNG)</label>
                    </div>
                    <div class="input-group" id="ciColorGroup" style="opacity: 0.5; pointer-events: none;">
                        <input type="color" id="ciColorPicker" value="#ffffff">
                        <input type="text" id="ciHexInput" value="#ffffff" maxlength="7">
                    </div>
                </div>
                <div>
                    <label>보조선 및 크기 조절</label>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="checkbox" id="ciGuideGrid"><label for="ciGuideGrid" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">격자 가이드 (코코포리아 1칸 비율)</label>
                    </div>
                    <div class="input-group" style="margin-bottom: 8px;">
                        <input type="number" id="ciImgW" class="full-width" placeholder="자동"><span style="font-size:13px; color:#64748b;">가로 px</span>
                    </div>
                    <div class="input-group">
                        <input type="checkbox" id="ciFineZoom"><label for="ciFineZoom" style="margin:0; cursor:pointer; font-weight:normal; font-size:13.5px;">마우스 휠 감도 세밀하게</label>
                    </div>
                </div>
                <button id="btnCropCutin" class="action-btn" disabled margin-top="auto">컷인 이미지 다운로드</button>
            </div>
        </div>
    </div>
</div>

<template id="tpl-grid-3x3">
    <svg class="custom-guide" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;">
        <line x1="33.33" y1="0" x2="33.33" y2="100" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
        <line x1="66.66" y1="0" x2="66.66" y2="100" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
        <line x1="0" y1="33.33" x2="100" y2="33.33" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
        <line x1="0" y1="66.66" x2="100" y2="66.66" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="2" opacity="0.7"/>
    </svg>
</template>
<template id="tpl-circle">
    <svg class="custom-guide" viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;">
        <circle cx="50" cy="50" r="50" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3" opacity="0.8"/>
    </svg>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    let croppers = { hs: null, pt: null, col: null, ci: null };
    let files = { hs: null, pt: [], ci: null };
    let flags = { hs: false, pt: false, ci: false };

    const BASE_OPTS = {
        viewMode: 0, dragMode: 'move', autoCropArea: 1, cropBoxMovable: false, 
        cropBoxResizable: false, toggleDragModeOnDblclick: false, guides: false, 
        center: true, background: false, wheelZoomRatio: 0.5 
    };

    const resizeBox = (boxId, w, h) => {
        const box = document.getElementById(boxId);
        if (!box) return;
        const ratio = w / h;
        if (ratio > 1) { box.style.width = '450px'; box.style.height = (450 / ratio) + 'px'; } 
        else { box.style.height = '450px'; box.style.width = (450 * ratio) + 'px'; }
    };

    const downloadBlob = (blob, name) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    };

    const extractNameParts = (filename) => {
        const b = filename.replace(/\.[^/.]+$/, "");
        const p = b.split('_');
        return p.length > 1 ? p[p.length - 1] : b; 
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
            const targetId = e.target.dataset.target;
            document.getElementById(targetId).classList.add('active');
            e.target.classList.add('active');
            
            setTimeout(() => {
                if (targetId === 'tab-headshot' && flags.hs) { runCropper('hs'); flags.hs = false; }
                if (targetId === 'tab-portrait' && flags.pt) { runCropper('pt'); runCropper('col'); flags.pt = false; }
                if (targetId === 'tab-cutin' && flags.ci) { runCropper('ci'); flags.ci = false; }
            }, 10);
        });
    });

    const createCocoGrid = (w, h) => {
        const svgns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgns, "svg");
        svg.setAttribute("class", "custom-guide");
        svg.setAttribute("viewBox", `0 0 ${w} ${h}`); svg.setAttribute("preserveAspectRatio", "none");
        Object.assign(svg.style, { position:'absolute', top:'0', left:'0', width:'100%', height:'100%', pointerEvents:'none', zIndex:'999' });

        const cellSize = w / 10; 
        for(let x = cellSize; x < w; x += cellSize) {
            const line = document.createElementNS(svgns, "line");
            line.setAttribute("x1", x); line.setAttribute("y1", 0); line.setAttribute("x2", x); line.setAttribute("y2", h);
            line.setAttribute("stroke", "#2563eb"); line.setAttribute("stroke-width", Math.max(1, w/200).toString()); line.setAttribute("stroke-dasharray", "4"); line.setAttribute("opacity", "0.6");
            svg.appendChild(line);
        }
        for(let y = cellSize; y < h; y += cellSize) {
            const line = document.createElementNS(svgns, "line");
            line.setAttribute("x1", 0); line.setAttribute("y1", y); line.setAttribute("x2", w); line.setAttribute("y2", y);
            line.setAttribute("stroke", "#2563eb"); line.setAttribute("stroke-width", Math.max(1, w/200).toString()); line.setAttribute("stroke-dasharray", "4"); line.setAttribute("opacity", "0.6");
            svg.appendChild(line);
        }
        return svg;
    };

    const drawGuides = (type, w, h, cropperInst) => {
        if (!cropperInst || !cropperInst.cropper) return;
        const viewBox = cropperInst.cropper.querySelector('.cropper-view-box');
        if (!viewBox) return;
        
        viewBox.querySelectorAll('.custom-guide').forEach(el => el.remove());

        const showGrid = document.getElementById(`${type}GuideGrid`)?.checked;
        const showCircle = document.getElementById(`${type}GuideCircle`)?.checked;

        if (showGrid) {
            if (type === 'hs') viewBox.appendChild(document.getElementById('tpl-grid-3x3').content.cloneNode(true));
            else viewBox.appendChild(createCocoGrid(w, h));
        }
        if (showCircle && type === 'hs') {
            viewBox.appendChild(document.getElementById('tpl-circle').content.cloneNode(true));
        }
    };

    const spawnCropperSafe = (file, boxId, prefix, w, h, inputId, extraOptions, onReady) => {
        return new Promise(resolve => {
            const box = document.getElementById(boxId);
            if (!box || box.offsetParent === null) { resolve(null); return; }

            updateCanvasBoxSize(boxId, w, h);
            box.innerHTML = ''; 
            
            const newImg = document.createElement('img');
            newImg.style.display = 'block'; 
            newImg.style.maxWidth = '100%';

            newImg.onload = () => {
                box.appendChild(newImg);
                setTimeout(() => {
                    let c;
                    c = new Cropper(newImg, {
                        ...BASE_OPTS, ...extraOptions, aspectRatio: w / h,
                        ready() {
                            if (inputId) {
                                const el = document.getElementById(inputId);
                                if (el) {
                                    el.value = Math.round(c.getImageData().width);
                                    const clone = el.cloneNode(true);
                                    el.replaceWith(clone);
                                    clone.addEventListener('change', ev => {
                                        const nw = parseInt(ev.target.value);
                                        if (nw) c.zoomTo(nw / c.getImageData().naturalWidth);
                                    });
                                }
                            }
                            drawGuides(prefix, w, h, c);
                            if (onReady) onReady(c);
                            resolve(c); 
                        },
                        zoom(e) {
                            if (inputId) {
                                const el = document.getElementById(inputId);
                                if (el) el.value = Math.round(c.getImageData().naturalWidth * e.detail.ratio);
                            }
                        }
                    });
                }, 50); 
            };
            newImg.src = URL.createObjectURL(file);
        });
    };

    ['hs', 'pt', 'col', 'ci'].forEach(type => {
        const chk = document.getElementById(`${type}Transparent`), grp = document.getElementById(`${type}ColorGroup`);
        const pck = document.getElementById(`${type}ColorPicker`), hex = document.getElementById(`${type}HexInput`);
        if(chk && grp) {
            chk.addEventListener('change', () => { grp.style.opacity = chk.checked ? '0.5' : '1'; grp.style.pointerEvents = chk.checked ? 'none' : 'auto'; });
            pck.addEventListener('input', e => hex.value = e.target.value);
            hex.addEventListener('input', e => {
                let v = e.target.value; if(!v.startsWith('#')) v = '#' + v; e.target.value = v;
                if(/^#[0-9A-F]{6}$/i.test(v)) pck.value = v;
            });
        }
        
        document.getElementById(`${type}FineZoom`)?.addEventListener('change', e => {
            const r = e.target.checked ? 0.02 : 0.5;
            if(croppers[type]) croppers[type].options.wheelZoomRatio = r;
        });

        document.getElementById(`${type}GuideGrid`)?.addEventListener('change', () => {
            let c = croppers[type];
            let w = type === 'hs' ? 100 : (document.getElementById(`${type}W`)?.value || 100);
            let h = type === 'hs' ? 100 : (document.getElementById(`${type}H`)?.value || 100);
            drawGuides(type, w, h, c);
        });
        document.getElementById(`${type}GuideCircle`)?.addEventListener('change', () => {
            drawGuides('hs', 100, 100, croppers.hs);
        });
    });

    resizeBox('hsBox', 1, 1);
    resizeBox('ptBox', 460, 800);
    resizeBox('colBox', 460, 460);
    resizeBox('ciBox', 1200, 400);

    const runCropper = async (type) => {
        if (type === 'hs') {
            if(!files.hs) return;
            if(croppers.hs) croppers.hs.destroy();
            const z = document.getElementById('hsFineZoom').checked ? 0.02 : 0.5;
            const c = await spawnCropperSafe(files.hs, 'hsBox', 'hs', 1, 1, 'hsImgW', { wheelZoomRatio: z }, () => {
                document.getElementById('btnCropHeadshot').disabled = false;
            });
            if(c) croppers.hs = c; else flags.hs = true;
        } else if (type === 'pt') {
            if(!files.pt.length) return;
            if(croppers.pt) croppers.pt.destroy();
            const w = parseInt(document.getElementById('portraitW').value) || 460;
            const h = document.getElementById('ptSquareToggle').checked ? w : (parseInt(document.getElementById('portraitH').value) || 800);
            const z = document.getElementById('ptFineZoom').checked ? 0.02 : 0.5;
            const c = await spawnCropperSafe(files.pt[0], 'ptBox', 'pt', w, h, 'ptImgW', { rotatable: true, wheelZoomRatio: z }, () => {
                document.getElementById('btnCropPortrait').disabled = false;
            });
            if(c) croppers.pt = c; else flags.pt = true;
        } else if (type === 'col') {
            if(!files.pt.length) return;
            if(croppers.col) croppers.col.destroy();
            const w = parseInt(document.getElementById('colW').value) || 460;
            const h = document.getElementById('colSquareToggle').checked ? w : (parseInt(document.getElementById('colH').value) || 460);
            const z = document.getElementById('colFineZoom').checked ? 0.02 : 0.5;
            const c = await spawnCropperSafe(files.pt[0], 'colBox', 'col', w, h, 'colImgW', { rotatable: true, wheelZoomRatio: z }, () => {
                document.getElementById('btnGeneratePreview').disabled = false;
            });
            if(c) croppers.col = c; else flags.pt = true; // 2번탭 깃발 공유
        } else if (type === 'ci') {
            if(!files.ci) return;
            if(croppers.ci) croppers.ci.destroy();
            const w = parseInt(document.getElementById('cutinW').value) || 1200;
            const h = parseInt(document.getElementById('cutinH').value) || 400;
            const z = document.getElementById('ciFineZoom').checked ? 0.02 : 0.5;
            const c = await spawnCropperSafe(files.ci, 'ciBox', 'ci', w, h, 'ciImgW', { wheelZoomRatio: z }, () => {
                document.getElementById('btnCropCutin').disabled = false;
            });
            if(c) croppers.ci = c; else flags.ci = true;
        }
    };

    document.getElementById('fileHeadshot').addEventListener('change', e => {
        if(!e.target.files.length) return;
        files.hs = e.target.files[0]; runCropper('hs');
    });

    document.getElementById('btnCropHeadshot').addEventListener('click', () => {
        if(!croppers.hs) return;
        const color = document.getElementById('hsTransparent').checked ? 'transparent' : document.getElementById('hsColorPicker').value;
        const canvas = croppers.hs.getCroppedCanvas({ fillColor: color, imageSmoothingQuality: 'high' });
        if(canvas) canvas.toBlob(b => downloadBlob(b, files.hs.name));
    });

    document.getElementById('filePortrait').addEventListener('change', e => {
        if(!e.target.files.length) return;
        files.pt = Array.from(e.target.files);
        document.getElementById('portraitFileCount').innerText = `선택된 파일: ${files.pt.length}개`;
        document.getElementById('portraitRotateSlider').value = 0; document.getElementById('rotateValue').innerText = "0°";
        document.getElementById('colRotateSlider').value = 0; document.getElementById('colRotateValue').innerText = "0°";
        runCropper('pt'); runCropper('col');
    });

    document.getElementById('ptSquareToggle').addEventListener('change', e => {
        document.getElementById('portraitH').disabled = e.target.checked;
        if(e.target.checked) document.getElementById('portraitH').value = document.getElementById('portraitW').value;
        if(files.pt.length) runCropper('pt');
    });
    ['portraitW', 'portraitH'].forEach(id => document.getElementById(id).addEventListener('change', () => { 
        if(document.getElementById('ptSquareToggle').checked) document.getElementById('portraitH').value = document.getElementById('portraitW').value;
        if(files.pt.length) runCropper('pt'); 
    }));

    document.getElementById('colSquareToggle').addEventListener('change', e => {
        document.getElementById('colH').disabled = e.target.checked;
        if(e.target.checked) document.getElementById('colH').value = document.getElementById('colW').value;
        if(files.pt.length) runCropper('col');
    });
    ['colW', 'colH'].forEach(id => document.getElementById(id).addEventListener('change', () => { 
        if(document.getElementById('colSquareToggle').checked) document.getElementById('colH').value = document.getElementById('colW').value;
        if(files.pt.length) runCropper('col'); 
    }));

    window.rotateManual = (type, deg) => {
        let c = type === 'pt' ? croppers.pt : croppers.col; if(!c) return;
        const sld = document.getElementById(`${type === 'pt' ? 'portrait' : 'col'}RotateSlider`);
        let v = parseInt(sld.value) + deg; if(v > 180) v -= 360; if(v < -180) v += 360;
        sld.value = v; document.getElementById(`${type === 'pt' ? '' : 'col'}RotateValue`).innerText = `${v}°`;
        c.rotateTo(v);
    };
    window.resetManual = (type) => {
        let c = type === 'pt' ? croppers.pt : croppers.col; if(!c) return;
        document.getElementById(`${type === 'pt' ? 'portrait' : 'col'}RotateSlider`).value = 0;
        document.getElementById(`${type === 'pt' ? '' : 'col'}RotateValue`).innerText = "0°";
        c.reset(); document.getElementById(`${type}ImgW`).value = Math.round(c.getImageData().width);
    };
    document.getElementById('portraitRotateSlider').addEventListener('input', e => {
        document.getElementById('rotateValue').innerText = `${e.target.value}°`;
        if(croppers.pt) croppers.pt.rotateTo(parseInt(e.target.value));
    });
    document.getElementById('colRotateSlider').addEventListener('input', e => {
        document.getElementById('colRotateValue').innerText = `${e.target.value}°`;
        if(croppers.col) croppers.col.rotateTo(parseInt(e.target.value));
    });

    document.getElementById('btnCropPortrait').addEventListener('click', async function() {
        if (!croppers.pt || !files.pt.length) return;
        this.innerText = '압축 파일 생성 중...'; this.disabled = true;
        const w = parseInt(document.getElementById('portraitW').value) || 460;
        const h = document.getElementById('ptSquareToggle').checked ? w : (parseInt(document.getElementById('portraitH').value) || 800);
        const data = croppers.pt.getData(); const zip = new JSZip();
        
        const offC = document.createElement('div'); Object.assign(offC.style, { position:'absolute', top:'-9999px', width:'1000px' }); document.body.appendChild(offC);

        for (let file of files.pt) {
            const hImg = document.createElement('img'); hImg.style.display = 'block'; hImg.style.maxWidth = '100%'; offC.appendChild(hImg);
            await new Promise(res => {
                hImg.onload = () => {
                    let tempCropper;
                    tempCropper = new Cropper(hImg, { ...BASE_OPTS, aspectRatio: w/h, ready() {
                        tempCropper.setData(data);
                        const canvas = tempCropper.getCroppedCanvas({ width: w, height: h, fillColor: 'transparent', imageSmoothingQuality: 'high' });
                        if(canvas) {
                            canvas.toBlob(b => { 
                                zip.file(file.name, b); 
                                tempCropper.destroy(); offC.innerHTML = ''; res(); 
                            }, 'image/png');
                        } else {
                            tempCropper.destroy(); offC.innerHTML = ''; res();
                        }
                    }});
                };
                hImg.src = URL.createObjectURL(file);
            });
        }
        document.body.removeChild(offC);
        downloadBlob(await zip.generateAsync({type:"blob"}), "synchronized_portraits.zip");
        this.innerText = '전체 파일 개별 추출 (ZIP)'; this.disabled = false;
    });

    document.getElementById('btnGeneratePreview').addEventListener('click', async function() {
        if (!croppers.col || !files.pt.length) return;
        this.innerText = '그리드 생성 중...'; this.disabled = true;

        const w = parseInt(document.getElementById('colW').value) || 460;
        const h = document.getElementById('colSquareToggle').checked ? w : (parseInt(document.getElementById('colH').value) || 460);
        const data = croppers.col.getData();
        const gridArea = document.getElementById('collageGrid');
        gridArea.innerHTML = ''; document.getElementById('collagePreviewArea').style.display = 'block';

        const offC = document.createElement('div'); Object.assign(offC.style, { position:'absolute', top:'-9999px', width:'1000px' }); document.body.appendChild(offC);

        for (let [idx, file] of files.pt.entries()) {
            const hImg = document.createElement('img'); hImg.style.display = 'block'; hImg.style.maxWidth = '100%'; offC.appendChild(hImg);
            await new Promise(res => {
                hImg.onload = () => {
                    let tempCropper;
                    tempCropper = new Cropper(hImg, { ...BASE_OPTS, aspectRatio: w/h, ready() {
                        tempCropper.setData(data);
                        const canvas = tempCropper.getCroppedCanvas({ width: w, height: h, fillColor: 'transparent', imageSmoothingQuality: 'high' });
                        if(canvas) {
                            const b64 = canvas.toDataURL();
                            const item = document.createElement('div');
                            item.className = 'collage-item'; item.draggable = true; item.dataset.id = idx;
                            
                            const pImg = document.createElement('img'); pImg.src = b64;
                            const pInput = document.createElement('input'); pInput.type = 'text'; pInput.value = extractNameParts(file.name);
                            
                            const controls = document.createElement('div'); controls.className = 'item-controls';
                            const btnL = document.createElement('button'); btnL.innerText = '◀';
                            const btnR = document.createElement('button'); btnR.innerText = '▶';
                            
                            btnL.onclick = () => { if(item.previousElementSibling) gridArea.insertBefore(item, item.previousElementSibling); };
                            btnR.onclick = () => { if(item.nextElementSibling) gridArea.insertBefore(item.nextElementSibling, item); };
                            
                            controls.append(btnL, btnR); item.append(pImg, pInput, controls);
                            gridArea.appendChild(item);
                        }
                        tempCropper.destroy(); offC.innerHTML = ''; res();
                    }});
                };
                hImg.src = URL.createObjectURL(file);
            });
        }
        document.body.removeChild(offC);
        this.innerText = '✨ 하단에 그리드 미리보기 생성'; this.disabled = false;
    });

    const gridEl = document.getElementById('collageGrid');
    let draggedItem = null;
    gridEl.addEventListener('dragstart', e => { draggedItem = e.target.closest('.collage-item'); setTimeout(()=>draggedItem.style.opacity='0.5',0); });
    gridEl.addEventListener('dragend', () => { if(draggedItem){ draggedItem.style.opacity='1'; draggedItem = null; }});
    gridEl.addEventListener('dragover', e => {
        e.preventDefault(); const t = e.target.closest('.collage-item');
        if (t && t !== draggedItem) {
            const r = t.getBoundingClientRect();
            gridEl.insertBefore(draggedItem, ((e.clientX - r.left) / (r.right - r.left) > 0.5) ? t.nextSibling : t);
        }
    });

    document.getElementById('btnDownloadCollage').addEventListener('click', async function() {
        const items = document.querySelectorAll('.collage-item');
        if (!items.length) return;
        this.innerText = '이미지 생성 중...'; this.disabled = true;

        const w = parseInt(document.getElementById('colW').value) || 460;
        const h = document.getElementById('colSquareToggle').checked ? w : parseInt(document.getElementById('colH').value);
        const cols = parseInt(document.getElementById('colCols').value) || 3;
        const textColor = document.getElementById('colTextColor').value;
        const gap = 15;

        const rows = Math.ceil(items.length / cols);
        const gridW = (cols * w) + ((cols - 1) * gap), gridH = (rows * h) + ((rows - 1) * gap);
        
        let sideImg = null, sideW = 0;
        const sideFile = document.getElementById('colSideImg').files[0];
        if (sideFile) { 
            sideImg = new Image(); 
            await new Promise(r => { sideImg.onload = () => { sideW = sideImg.naturalWidth * (gridH / sideImg.naturalHeight); r(); }; sideImg.src = URL.createObjectURL(sideFile); }); 
        }

        const cvs = document.createElement('canvas');
        cvs.width = (sideImg ? sideW + gap : 0) + gridW + (gap * 2); cvs.height = gridH + (gap * 2);
        const ctx = cvs.getContext('2d');
        
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cvs.width, cvs.height);
        if (sideImg) ctx.drawImage(sideImg, gap, gap, sideW, gridH);

        const offsetX = gap + (sideImg ? sideW + gap : 0);
        
        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            const imgSrc = item.querySelector('img').src, text = item.querySelector('input').value;
            const tx = offsetX + (i % cols)*(w + gap), ty = gap + Math.floor(i / cols)*(h + gap);
            
            await new Promise(r => {
                const tmpImg = new Image();
                tmpImg.onload = () => {
                    ctx.drawImage(tmpImg, tx, ty, w, h);
                    if (text) {
                        const fs = Math.max(20, Math.floor(w * 0.12));
                        ctx.font = `900 ${fs}px "Pretendard", sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = Math.max(4, fs * 0.25); ctx.lineJoin = 'round';
                        ctx.strokeText(text, tx + w/2, ty + h - (fs*0.2));
                        ctx.fillStyle = textColor; ctx.fillText(text, tx + w/2, ty + h - (fs*0.2));
                    }
                    r();
                };
                tmpImg.src = imgSrc;
            });
        }
        cvs.toBlob(b => { downloadBlob(b, 'portrait_collage.png'); this.innerText = '콜라주 최종 다운로드'; this.disabled = false; });
    });

    // 탭 3 이벤트
    document.getElementById('fileCutin').addEventListener('change', e => {
        if(!e.target.files.length) return;
        files.ci = e.target.files[0]; runCropper('ci');
    });
    ['cutinW', 'cutinH'].forEach(id => document.getElementById(id).addEventListener('change', () => { if(files.ci) runCropper('ci'); }));
    document.getElementById('btnCropCutin').addEventListener('click', () => {
        if(!croppers.ci) return;
        const color = document.getElementById('ciTransparent').checked ? 'transparent' : document.getElementById('ciColorPicker').value;
        const canvas = croppers.ci.getCroppedCanvas({ width: parseInt(document.getElementById('cutinW').value), height: parseInt(document.getElementById('cutinH').value), fillColor: color, imageSmoothingQuality: 'high' });
        if(canvas) canvas.toBlob(b => downloadBlob(b, files.ci.name));
    });
</script>

</body>
</html>
